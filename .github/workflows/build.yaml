name: build

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  release:
    types: [published]

  workflow_dispatch:

permissions:
  contents: write
  
jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
    steps:
      - name: Generate VERSION_NAME
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION_NAME="${{ github.ref_name }}"
          else
            VERSION_NAME="${GITHUB_SHA::7}"
          fi
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "VERSION_NAME=${VERSION_NAME}"


  build:
    name: build-${{ matrix.os }}-${{ matrix.arch }}
    needs: setup
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            os: windows
            arch: x64
          - runner: ubuntu-22.04
            os: windows
            arch: arm64
          - runner: ubuntu-22.04
            os: linux
            arch: x64
          - runner: ubuntu-22.04
            os: linux
            arch: arm64
          - runner: macos-14
            os: macos
            arch: arm64
          - runner: macos-14
            os: macos
            arch: x64
          - runner: ubuntu-22.04
            os: android
            arch: arm64
          - runner: ubuntu-22.04
            os: android
            arch: x64
          - runner: macos-14
            os: ios
            arch: arm64

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies (Ubuntu, windows cross)
        if: runner.os == 'Linux' && matrix.os == 'windows'
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends \
            unzip \
            xz-utils \
            bzip2 \
            ninja-build \
            binutils \
            autoconf \
            automake \
            autotools-dev \
            autopoint \
            libtool \
            pkg-config \
            dpkg-dev \
            curl \
            ca-certificates \
            python3-docutils \
            cmake

      - name: Install build dependencies (Ubuntu, linux native)
        if: runner.os == 'Linux' && matrix.os == 'linux' && matrix.arch == 'x64'
        run: |
          sudo apt update
          sudo apt install -y \
            g++-12 \
            autoconf \
            automake \
            autotools-dev \
            autopoint \
            libtool \
            pkg-config \
            libssl-dev \
            libc-ares-dev \
            zlib1g-dev \
            libsqlite3-dev \
            libssh2-1-dev \
            libexpat1-dev \
            libcppunit-dev

      - name: Install build dependencies (Ubuntu, linux arm64 cross)
        if: runner.os == 'Linux' && matrix.os == 'linux' && matrix.arch == 'arm64'
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            unzip \
            xz-utils \
            bzip2 \
            make \
            ninja-build \
            binutils \
            autoconf \
            automake \
            autotools-dev \
            autopoint \
            libtool \
            pkg-config \
            dpkg-dev \
            curl \
            ca-certificates \
            python3-docutils \
            cmake

      - name: Install build dependencies (Ubuntu, android cross)
        if: runner.os == 'Linux' && matrix.os == 'android'
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends \
            unzip \
            bzip2 \
            ninja-build \
            binutils \
            autoconf \
            automake \
            autotools-dev \
            autopoint \
            libtool \
            pkg-config \
            dpkg-dev \
            curl \
            ca-certificates \
            python3-docutils \
            cmake

      - name: Install build dependencies (macOS native)
        if: runner.os == 'macOS' && matrix.os == 'macos' && matrix.arch == 'arm64'
        run: |
          brew install --quiet \
            cppunit \
            gettext \
            openssl \
            libssh2 \
            c-ares \
            sqlite3 \
            autoconf \
            automake \
            pkg-config \
            libtool

      - name: Install build dependencies (macOS x64 cross)
        if: runner.os == 'macOS' && matrix.os == 'macos' && matrix.arch == 'x64'
        run: |
          brew install --quiet gettext autoconf automake pkg-config libtool

      - name: Install build dependencies (iOS)
        if: runner.os == 'macOS' && matrix.os == 'ios'
        run: |
          brew install --quiet gettext autoconf automake pkg-config libtool

      - name: Download and extract llvm-mingw
        if: matrix.os == 'windows'
        run: |
          export BUILD_DIR="$PWD/build"
          mkdir -p "$BUILD_DIR"
          cd "$BUILD_DIR"
          curl -L -o llvm-mingw.tar.xz "https://github.com/mstorsjo/llvm-mingw/releases/download/20260224/llvm-mingw-20260224-msvcrt-ubuntu-22.04-x86_64.tar.xz"
          tar xf llvm-mingw.tar.xz
          rm llvm-mingw.tar.xz
          echo "LLVM_MINGW_DIR=$BUILD_DIR/$(ls -d llvm-mingw-* | head -1)" >> "$GITHUB_ENV"

      - name: Download NDK
        if: matrix.os == 'android'
        run: |
          mkdir -p build
          cd build
          curl -L -O https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          cd ..

      - name: Build aria2 and aria2_c_api
        run: |
          chmod +x build.sh
          VERSION_NAME="${{ needs.setup.outputs.version_name }}" ./build.sh ${{ matrix.os }} ${{ matrix.arch }}

      - name: Upload to Artifacts (for non-release builds)
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}-${{ needs.setup.outputs.version_name }}-${{ github.run_number }}
          path: |
            aria2-${{ matrix.os }}-${{ matrix.arch }}-${{ needs.setup.outputs.version_name }}.tar.gz
            aria2_c_api-${{ matrix.os }}-${{ matrix.arch }}-${{ needs.setup.outputs.version_name }}.tar.gz
          retention-days: 30
          if-no-files-found: error

      - name: Upload to Release Assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            aria2-${{ matrix.os }}-${{ matrix.arch }}-${{ needs.setup.outputs.version_name }}.tar.gz
            aria2_c_api-${{ matrix.os }}-${{ matrix.arch }}-${{ needs.setup.outputs.version_name }}.tar.gz
          fail_on_unmatched_files: true
